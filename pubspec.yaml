name: renovily
description: "Renovily"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_map: ^8.2.1
  latlong2: ^0.9.0
  http: ^1.2.0
  go_router: ^16.2.4
  shared_preferences: ^2.5.3
  image_picker: ^1.2.0
  flutter_secure_storage: ^9.2.4
  dio: ^5.9.0
  url_launcher: ^6.3.2
  pdf: ^3.11.0
  printing: ^5.13.0
  intl: ^0.19.0
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  share_plus: ^12.0.1
  qr_flutter: ^4.1.0

  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/renovily-icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
